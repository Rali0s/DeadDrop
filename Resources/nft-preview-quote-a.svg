<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024"><defs><linearGradient id="paper" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f2ede2"/><stop offset="100%" stop-color="#e6dfd1"/></linearGradient></defs><rect width="1024" height="1024" fill="#0f1115"/><rect x="32" y="32" width="960" height="960" rx="22" fill="url(#paper)" stroke="#141414" stroke-width="4"/><rect x="64" y="64" width="896" height="896" rx="14" fill="none" stroke="#141414" stroke-width="2"/><line x1="512" y1="64" x2="512" y2="960" stroke="#1e1e1e" stroke-opacity="0.15" stroke-width="2"/><text x="512" y="120" text-anchor="middle" font-family="monospace" font-size="20" font-weight="700" letter-spacing="2">DAILY WAR BRIEF</text><text x="512" y="152" text-anchor="middle" font-family="monospace" font-size="14" fill="#333">2026-02-20 // DAY 0 // #1</text><text x="96" y="214" font-family="monospace" font-size="12" fill="#444">REF cw-svg-a</text><text x="96" y="96" font-family="monospace" font-size="18" font-weight="700"><tspan x="96" y="96">The Bureaucratic Sham</tspan></text><text x="96" y="320" font-family="monospace" font-size="14" fill="#181818"><tspan x="96" y="342">Aldrich Ames justified treason as a critique</tspan><tspan x="96" y="368">of bureaucracy, exposing internal trust vuln</tspan><tspan x="96" y="394">erabilities.</tspan></text><rect x="72" y="704" width="880" height="220" rx="10" fill="#ffffff" fill-opacity="0.35" stroke="#1f1f1f" stroke-opacity="0.45" stroke-width="2"/><text x="96" y="734" font-family="monospace" font-size="12" fill="#444">QUOTE</text><text x="96" y="748" font-family="monospace" font-size="14" fill="#101010"><tspan x="96" y="752">I had come to believe that the espionage busi</tspan><tspan x="96" y="776">ness was and is a self-serving sham.</tspan></text><text x="96" y="872" font-family="monospace" font-size="13" fill="#303030">Aldrich Ames</text><rect x="540" y="204" width="72" height="24" rx="4" fill="#f7f1e4" stroke="#262626" stroke-width="1"/><text x="550" y="220" font-family="monospace" font-size="11" fill="#222" font-weight="700">HUMINT</text><rect x="622" y="204" width="80" height="24" rx="4" fill="#f7f1e4" stroke="#262626" stroke-width="1"/><text x="632" y="220" font-family="monospace" font-size="11" fill="#222" font-weight="700">TRAITOR</text><rect x="712" y="204" width="120" height="24" rx="4" fill="#f7f1e4" stroke="#262626" stroke-width="1"/><text x="722" y="220" font-family="monospace" font-size="11" fill="#222" font-weight="700">COUNTERINTEL</text><rect x="842" y="204" width="72" height="24" rx="4" fill="#f7f1e4" stroke="#262626" stroke-width="1"/><text x="852" y="220" font-family="monospace" font-size="11" fill="#222" font-weight="700">LESSON</text></svg>