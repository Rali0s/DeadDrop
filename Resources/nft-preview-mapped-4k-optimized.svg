<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"><defs><style>.paper{fill:#ece7dc}.stroke,.thin{stroke:#141414;fill:none;vector-effect:non-scaling-stroke}.stroke{stroke-width:3}.thin{stroke-width:2}.mono{font-family:monospace}.title{font-size:34px;letter-spacing:.12em;font-weight:800;fill:#141414}.sub{font-size:16px;letter-spacing:.18em;font-weight:700;fill:#3a3a3a}.line{font-size:16px;letter-spacing:.04em;fill:#141414}.micro{font-size:12px;letter-spacing:.06em;fill:#3a3a3a}.ink{fill:#141414}</style></defs><rect class="paper" x="0" y="0" width="1024" height="1024"/><rect class="stroke" x="48" y="48" width="928" height="928"/><circle class="thin" cx="94" cy="94" r="18"/><circle class="thin" cx="96" cy="94" r="15"/><line class="thin" x1="82" y1="94" x2="76" y2="94"/><text class="mono title" x="512" y="132" text-anchor="middle">DAILY WAR BRIEF</text><text class="mono sub" x="512" y="168" text-anchor="middle">2026-02-20 // THE CUBAN MISSILE INTELLIGENCE</text><text class="mono line" x="92" y="248"><tspan x="92" dy="0" font-weight="800">DOSSIER: USSR FILE</tspan><tspan x="92" dy="24" font-size="13" fill="#3a3a3a">REF: CW-1962-10-22-CUBA / DOSSIER-A</tspan><tspan x="92" dy="36" font-weight="800">DOSSIER: USA FILE</tspan><tspan x="92" dy="24" font-size="13" fill="#3a3a3a">REF: CW-1962-10-22-CUBA / DOSSIER-B</tspan><tspan x="92" dy="34" font-weight="800">CLASSIFICATION: СОВЕРШЕННО СЕКРЕТНО</tspan><tspan x="92" dy="26" font-size="13">MECHANISM: HOLLOW COIN / MICROFILM</tspan><tspan x="92" dy="26" font-weight="800">VECTOR: SILENT EXCHANGE</tspan><tspan x="92" dy="26" font-weight="800">LESSON: TIMELY INTELLIGENCE CAN AVERT CATASTRO</tspan><tspan x="92" dy="34" font-weight="800">CLASSIFICATION: EYES ONLY</tspan><tspan x="92" dy="26" font-size="13">FAILURE MODE: DROP / DISCOVERY / RECOVERY</tspan><tspan x="92" dy="26" font-weight="800">COUNTERMEASURE: ASSUME THE SMALL THING LEAKS</tspan><tspan x="92" dy="26" font-size="13">FIELD NOTE: TRADECRAFT / ARCHIVE</tspan></text><g><text class="mono micro" x="112" y="724">QUOTE (TRADECRAFT)</text><text class="mono" x="112" y="764" fill="#141414" font-size="16" font-weight="700"><tspan x="112" dy="0">"We’re eyeball to eyeball, and I think the other fellow just blinked,"</tspan><tspan x="112" dy="30">quipped Secretary of State Dean Rusk as Soviet ships turned back — a</tspan><tspan x="112" dy="30">testament to the high-stakes intelligence standoff.</tspan></text><text class="mono micro" x="112" y="908">— CIA Cuban Missile Files</text></g><g transform="translate(88 604)"><rect x="0" y="0" width="848" height="86" fill="#111"/><text class="mono" x="424" y="36" text-anchor="middle" fill="#ece7dc" font-size="24" font-weight="900" letter-spacing=".08em">СЕКРЕТНО</text><text class="mono" x="424" y="64" text-anchor="middle" fill="#ece7dc" font-size="21" font-weight="800" letter-spacing=".14em">TOP SECRET</text></g></svg>
