<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Daily War Brief dossier: The Cuban Missile Intelligence"><defs><style>:root{--paper:#ece7dc;--ink:#141414;--muted:#3a3a3a;fill:none;vector-effect:non-scaling-stroke}.stroke{stroke-width:3}.thin{stroke-width:2}.mono{font-family:monospace}.title{font-size:34px;letter-spacing:.12em;font-weight:800}.sub{font-size:16px;letter-spacing:.18em;font-weight:700}.small{font-size:14px;letter-spacing:.08em}.micro{font-size:12px;letter-spacing:.06em}.muted{fill:var(--muted)}.ink{fill:var(--ink)}</style></defs><rect class="paper" x="0" y="0" width="1024" height="1024"/><rect class="stroke" x="48" y="48" width="928" height="928" rx="18"/><circle class="thin" cx="94" cy="94" r="18"/><circle class="thin" cx="96" cy="94" r="15"/><line class="thin" x1="82" y1="94" x2="76" y2="94"/><text class="mono title ink" x="512" y="132" text-anchor="middle">DAILY WAR BRIEF</text><text class="mono sub muted" x="512" y="168" text-anchor="middle">2026-02-20 // THE CUBAN MISSILE INTELLIGENCE</text><text class="mono micro ink" x="92" y="248">DOSSIER: USSR FILE</text><text class="mono micro muted" x="92" y="272" font-weight="800">REF: CW-1962-10-22-CUBA / DOSSIER-A</text><text class="mono micro ink" x="560" y="248">DOSSIER: USA FILE</text><text class="mono micro muted" x="560" y="272" font-weight="800">REF: CW-1962-10-22-CUBA / DOSSIER-B</text><g class="mono"><text class="micro muted" x="92" y="318">CLASSIFICATION</text><text class="small ink" x="92" y="342">СОВЕРШЕННО СЕКРЕТНО</text><text class="micro muted" x="92" y="392">MECHANISM</text><text class="small ink" x="92" y="416">HOLLOW COIN / MICROFILM</text><text class="micro muted" x="92" y="466">VECTOR</text><text class="small ink" x="92" y="490" font-weight="800">SILENT EXCHANGE</text><text class="micro muted" x="92" y="540">LESSON</text><text class="small ink" x="92" y="564">TIMELY INTELLIGENCE CAN AVERT CATASTRO</text></g><g class="mono"><text class="micro muted" x="560" y="318">CLASSIFICATION</text><text class="small ink" x="560" y="342">EYES ONLY</text><text class="micro muted" x="560" y="392">FAILURE MODE</text><text class="small ink" x="560" y="416" font-weight="800">DROP / DISCOVERY / RECOVERY</text><text class="micro muted" x="560" y="466">COUNTERMEASURE</text><text class="small ink" x="560" y="490">ASSUME THE SMALL THING LEAKS</text><text class="micro muted" x="560" y="540">FIELD NOTE</text><text class="small ink" x="560" y="564">TRADECRAFT / ARCHIVE</text></g><g><text class="mono micro muted" x="112" y="724">QUOTE (TRADECRAFT)</text><text class="mono" x="112" y="764" fill="var(--ink)" font-size="16" font-weight="700"><tspan x="112" dy="0">\"We’re eyeball to eyeball, and I think the other fellow just blinked,\"</tspan><tspan x="112" dy="30">quipped Secretary of State Dean Rusk as Soviet ships turned back — a</tspan><tspan x="112" dy="30">testament to the high-stakes intelligence standoff.</tspan></text><text class="mono micro muted" x="112" y="908">— CIA Cuban Missile Files</text></g><g transform="translate(88 604)"><rect x="0" y="0" width="848" height="86" fill="#111111"/><text class="mono" x="424" y="36" text-anchor="middle" fill="#ece7dc" font-size="24" font-weight="900" letter-spacing=".08em">СЕКРЕТНО</text><text class="mono" x="424" y="64" text-anchor="middle" fill="#ece7dc" font-size="21" font-weight="800" letter-spacing=".14em">TOP SECRET</text></g></svg>